<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Terracotta background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#2d1b0e"/>
  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#c9972a" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Left tower (shorter) -->
  <rect x="3" y="12" width="11" height="16" rx="1" fill="#c9972a" fill-opacity="0.22" stroke="#c9972a" stroke-width="1.1"/>
  <!-- Right tower (taller) -->
  <rect x="17" y="6" width="12" height="22" rx="1" fill="#c9972a" fill-opacity="0.38" stroke="#c9972a" stroke-width="1.1"/>
  <!-- Windows — left tower (2 rows × 2 cols) -->
  <rect x="5"   y="15" width="2.5" height="2.5" rx="0.4" fill="#c9972a"/>
  <rect x="9.5" y="15" width="2.5" height="2.5" rx="0.4" fill="#c9972a"/>
  <rect x="5"   y="20" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.55"/>
  <rect x="9.5" y="20" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.55"/>
  <!-- Windows — right tower (3 rows × 2 cols) -->
  <rect x="19.5" y="9"  width="2.5" height="2.5" rx="0.4" fill="#c9972a"/>
  <rect x="24"   y="9"  width="2.5" height="2.5" rx="0.4" fill="#c9972a"/>
  <rect x="19.5" y="14" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.8"/>
  <rect x="24"   y="14" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.8"/>
  <rect x="19.5" y="19" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.5"/>
  <rect x="24"   y="19" width="2.5" height="2.5" rx="0.4" fill="#c9972a" fill-opacity="0.5"/>
</svg>
