<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0a0f1e"/>
  <!-- Left tower (shorter) -->
  <rect x="3" y="12" width="11" height="16" rx="1" fill="#06b6d4" fill-opacity="0.25" stroke="#06b6d4" stroke-width="1.2"/>
  <!-- Right tower (taller) -->
  <rect x="17" y="6" width="12" height="22" rx="1" fill="#06b6d4" fill-opacity="0.4" stroke="#06b6d4" stroke-width="1.2"/>
  <!-- Windows — left tower (2 rows × 2 cols) -->
  <rect x="5"   y="15" width="2.5" height="2.5" rx="0.4" fill="#06b6d4"/>
  <rect x="9.5" y="15" width="2.5" height="2.5" rx="0.4" fill="#06b6d4"/>
  <rect x="5"   y="20" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.6"/>
  <rect x="9.5" y="20" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.6"/>
  <!-- Windows — right tower (3 rows × 2 cols) -->
  <rect x="19.5" y="9"  width="2.5" height="2.5" rx="0.4" fill="#06b6d4"/>
  <rect x="24"   y="9"  width="2.5" height="2.5" rx="0.4" fill="#06b6d4"/>
  <rect x="19.5" y="14" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.85"/>
  <rect x="24"   y="14" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.85"/>
  <rect x="19.5" y="19" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.6"/>
  <rect x="24"   y="19" width="2.5" height="2.5" rx="0.4" fill="#06b6d4" fill-opacity="0.6"/>
</svg>
